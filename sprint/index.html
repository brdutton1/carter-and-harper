<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Studio Sprint — Carter &amp; Harper · Studio HQ</title>
  <meta name="description" content="The Carter & Harper studio learning portal: 10 days from zero to a live, client-approved website." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/sprint/styles.css" />
  <link rel="stylesheet" href="/sprint/portal.css" />
  <link rel="stylesheet" href="/sprint/admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
</head>
<body class="preboot">

  <!-- boot splash (removed by auth.js once session is resolved) -->
  <div class="bootsplash" data-boot>
    <div class="bootsplash__logo">🚀</div>
    <div class="bootsplash__txt">Web Studio Sprint</div>
  </div>

  <!-- login screen (filled by auth.js when no session) -->
  <div id="auth" hidden></div>

  <!-- admin dashboard (filled by admin.js when Bryan logs in) -->
  <div id="admin" hidden></div>

  <!-- the portal (shown by auth.js after login) -->
  <div class="app" data-app hidden>
    <div class="scrim" data-scrim></div>

    <aside class="side" data-side>
      <div class="side__brand">
        <div class="side__kicker">Carter &amp; Harper Studio</div>
        <div class="side__title">Web Studio<br>Sprint</div>
        <div class="side__sub">10 days · one real client · go live</div>
      </div>

      <div class="prog">
        <div class="ring">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ff8906"/>
                <stop offset="0.55" stop-color="#f25f4c"/>
                <stop offset="1" stop-color="#e53170"/>
              </linearGradient>
            </defs>
            <circle class="ring__bg" cx="32" cy="32" r="27" fill="none" stroke-width="7"/>
            <circle class="ring__fg" data-ring cx="32" cy="32" r="27" fill="none" stroke-width="7"
                    stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
          </svg>
          <div class="ring__num" data-ringnum>0%</div>
        </div>
        <div class="prog__meta">
          <b data-shipped>0/10</b> <span>days shipped</span><br>
          <span data-checks>0 checks done</span>
        </div>
      </div>

      <nav class="nav" data-nav></nav>

      <div class="side__foot">
        <div class="userchip">
          <span class="userchip__av" data-user-av>?</span>
          <span class="userchip__id">
            <span class="userchip__name" data-user-name>—</span>
            <span class="userchip__role" data-user-specialty></span>
          </span>
        </div>
        <button class="btn-reset" data-logout>Log out</button>
      </div>
      <div class="side__foot side__foot--sub">
        <a href="/">← Studio site</a>
        <button class="btn-reset" data-reset>Reset progress</button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <button class="topbar__menu" data-menu aria-label="Menu">☰</button>
        <div class="topbar__title">Web Studio Sprint</div>
        <div class="topbar__mini"><b data-shipped2>0</b>/10 days</div>
      </div>
      <main class="wrap" data-view></main>
    </div>
  </div>

  <div class="toast" data-toast></div>

  <script src="/sprint/data.js"></script>
  <script src="/sprint/app.js"></script>
  <script type="module" src="/sprint/auth.js"></script>
</body>
</html>
